name: Refresh Profile Card

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate SVGs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python generate_profile.py

      - name: Commit & push if changed
        run: |
          git config user.name  "Fowzi82"
          git config user.email "fowziali82@gmail.com"
          git add dark.svg light.svg
          git diff --cached --quiet || git commit -m "chore: refresh profile card [skip ci]"
          git push